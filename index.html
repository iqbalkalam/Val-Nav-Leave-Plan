<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Val Nav — Leave Planner</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#0f172a; --panel:#ffffff; --ink:#0f172a; --muted:#64748b; --line:#e2e8f0;
  --accent:#4f46e5; --accent2:#6366f1; --soft:#f1f5f9;
  --timeoff:#4f46e5; --holiday:#0ea5e9;
  --shadow:0 1px 3px rgba(15,23,42,.08),0 8px 24px rgba(15,23,42,.06);
}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(180deg,#f8fafc,#eef2f7);color:var(--ink);}
header{background:linear-gradient(120deg,#4f46e5,#7c3aed);color:#fff;padding:20px 24px;box-shadow:var(--shadow)}
header h1{margin:0;font-size:20px;font-weight:700;letter-spacing:.2px}
header p{margin:4px 0 0;opacity:.85;font-size:13px}
.wrap{max-width:1180px;margin:0 auto;padding:20px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin:18px 0}
.tab{padding:9px 16px;border:none;border-radius:10px;background:#fff;color:var(--muted);font-weight:600;
  font-size:14px;cursor:pointer;box-shadow:var(--shadow);transition:.15s}
.tab:hover{color:var(--ink)}
.tab.active{background:var(--accent);color:#fff}
.toolbar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:16px}
select,input,button{font-family:inherit;font-size:14px}
.ctl{padding:8px 12px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink)}
.btn{padding:9px 15px;border:none;border-radius:9px;background:var(--accent);color:#fff;font-weight:600;cursor:pointer;box-shadow:var(--shadow)}
.btn.ghost{background:#fff;color:var(--accent);border:1px solid var(--line)}
.btn.danger{background:#ef4444}
.btn:hover{filter:brightness(1.05)}
.card{background:var(--panel);border-radius:14px;box-shadow:var(--shadow);padding:18px;margin-bottom:18px}
.legend{display:flex;gap:16px;flex-wrap:wrap;font-size:13px;color:var(--muted);align-items:center}
.dot{display:inline-block;width:11px;height:11px;border-radius:3px;margin-right:6px;vertical-align:middle}
.calhead{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.calhead h2{margin:0;font-size:17px}
.navbtn{border:1px solid var(--line);background:#fff;border-radius:8px;width:34px;height:34px;cursor:pointer;font-size:16px}
.grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.gh{text-align:center;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;padding:4px 0}
.cell{min-height:92px;border:1px solid var(--line);border-radius:10px;padding:6px;background:#fff;position:relative;cursor:pointer;transition:.12s}
.cell:hover{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,70,229,.12)}
.cell.empty{background:transparent;border:none;cursor:default}
.cell.today{border-color:var(--accent);box-shadow:0 0 0 2px rgba(79,70,229,.25)}
.cell .dn{font-size:12px;font-weight:700;color:var(--muted)}
.cell.weekend{background:#f8fafc}
.pill{display:block;font-size:11px;line-height:1.25;margin-top:3px;padding:2px 6px;border-radius:6px;color:#fff;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.more{font-size:10px;color:var(--muted);margin-top:2px}
table{width:100%;border-collapse:collapse;font-size:14px}
th,td{text-align:left;padding:9px 10px;border-bottom:1px solid var(--line)}
th{font-size:12px;text-transform:uppercase;color:var(--muted);letter-spacing:.4px}
tr:hover td{background:var(--soft)}
.tag{display:inline-block;font-size:11px;font-weight:700;padding:2px 8px;border-radius:20px;color:#fff}
.avatar{display:inline-flex;width:26px;height:26px;border-radius:50%;color:#fff;font-size:12px;font-weight:700;
  align-items:center;justify-content:center;margin-right:6px;vertical-align:middle}
.statgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px}
.stat{background:linear-gradient(180deg,#fff,#f8fafc);border:1px solid var(--line);border-radius:12px;padding:14px}
.stat .big{font-size:26px;font-weight:800}
.stat .lbl{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.bar{height:10px;border-radius:6px;background:var(--soft);overflow:hidden;margin-top:6px}
.bar > span{display:block;height:100%;background:var(--accent)}
.minirow{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px dashed var(--line)}
.overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:none;align-items:center;justify-content:center;padding:16px;z-index:50}
.overlay.show{display:flex}
.modal{background:#fff;border-radius:16px;padding:22px;width:100%;max-width:460px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{margin:0 0 14px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--muted);margin-bottom:5px;text-transform:uppercase;letter-spacing:.3px}
.field input,.field select{width:100%;padding:9px 11px;border:1px solid var(--line);border-radius:9px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;justify-content:space-between;gap:8px;margin-top:18px}
.daylist{max-height:60vh;overflow:auto}
.dayitem{display:flex;justify-content:space-between;align-items:center;padding:8px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px}
.hint{font-size:12px;color:var(--muted);margin-top:6px}
.empty-note{color:var(--muted);text-align:center;padding:24px}
@media(max-width:640px){.cell{min-height:66px}.pill{font-size:10px}}
</style>
</head>
<body>
<header>
  <div class="wrap" style="padding-top:0;padding-bottom:0">
    <h1>Val Nav — Leave Planner</h1>
    <p>Interactive team leave tracker · edits save in your browser</p>
  </div>
</header>
<div class="wrap">
  <div class="tabs">
    <button class="tab active" data-tab="calendar">📅 Calendar</button>
    <button class="tab" data-tab="people">👥 People</button>
    <button class="tab" data-tab="stats">📊 Stats</button>
  </div>

  <div class="card">
    <div class="toolbar">
      <select id="personFilter" class="ctl"></select>
      <select id="typeFilter" class="ctl">
        <option value="">All types</option>
        <option value="timeoff">Time Off</option>
        <option value="holiday">Holiday</option>
      </select>
      <button class="btn" id="addBtn">+ Add leave</button>
      <div style="flex:1"></div>
      <button class="btn ghost" id="exportXlsx">⬇ Excel</button>
      <button class="btn ghost" id="exportCsv">⬇ CSV</button>
      <button class="btn ghost" id="importBtn">⬆ Import</button>
      <input type="file" id="importFile" accept=".xlsx,.xls,.csv" style="display:none">
      <button class="btn ghost" id="resetBtn" title="Restore original data">↺ Reset</button>
    </div>
    <div class="legend">
      <span><span class="dot" style="background:var(--timeoff)"></span>Time Off</span>
      <span><span class="dot" style="background:var(--holiday)"></span>Holiday</span>
    </div>
  </div>

  <div id="view-calendar"></div>
  <div id="view-people" style="display:none"></div>
  <div id="view-stats" style="display:none"></div>
</div>

<div class="overlay" id="editOverlay">
  <div class="modal">
    <h3 id="modalTitle">Add leave</h3>
    <div class="field">
      <label>Person</label>
      <select id="mPerson"></select>
    </div>
    <div class="row2">
      <div class="field"><label>Start date</label><input type="date" id="mStart"></div>
      <div class="field"><label>End date</label><input type="date" id="mEnd"></div>
    </div>
    <div class="field">
      <label>Type</label>
      <select id="mType">
        <option value="timeoff">Time Off</option>
        <option value="holiday">Holiday</option>
      </select>
    </div>
    <div class="field"><label>Label / note (optional)</label><input type="text" id="mNote" placeholder="e.g. Canada Holiday, vacation…"></div>
    <div class="hint">A multi-day range creates one entry per day.</div>
    <div class="modal-actions">
      <button class="btn danger" id="mDelete" style="visibility:hidden">Delete</button>
      <div style="flex:1"></div>
      <button class="btn ghost" id="mCancel">Cancel</button>
      <button class="btn" id="mSave">Save</button>
    </div>
  </div>
</div>

<div class="overlay" id="dayOverlay">
  <div class="modal">
    <h3 id="dayTitle">Day</h3>
    <div class="daylist" id="dayList"></div>
    <div class="modal-actions">
      <button class="btn ghost" id="dayClose">Close</button>
      <button class="btn" id="dayAdd">+ Add on this day</button>
    </div>
  </div>
</div>

const MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
const PCOLORS=["#4f46e5","#0ea5e9","#10b981","#f59e0b","#ef4444","#8b5cf6","#ec4899","#14b8a6","#f97316","#6366f1","#0891b2","#db2777"];
const DEFAULT_PEOPLE=[...new Set(RAW.map(e=>e.person))].sort();
const KEY="valnav_leave_v2";
const PKEY="valnav_people_v2";

let PEOPLE=[];
const personColor=p=>PCOLORS[Math.max(0,PEOPLE.indexOf(p))%PCOLORS.length];
const initials=p=>p.slice(0,2).toUpperCase();

function classify(raw){
  const r=(raw||"").toLowerCase();
  if(/holiday/.test(r)) return {type:"holiday",label:raw};
  if(raw==="X"||raw==="x") return {type:"timeoff",label:"Time Off"};
  return {type:"timeoff",label:raw};
}
const ymd=dt=>`${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}-${String(dt.getDate()).padStart(2,'0')}`;
const TYPEVAR={timeoff:"--timeoff",holiday:"--holiday"};
const typeColor=t=>getComputedStyle(document.documentElement).getPropertyValue(TYPEVAR[t]||"--timeoff");
function labelOf(t){return t==='holiday'?'Holiday':'Time Off';}

let ENTRIES=[];
function seed(){
  return RAW.map((e,i)=>{
    const c=classify(e.raw);
    const d=`${e.year}-${String(e.month).padStart(2,'0')}-${String(e.day).padStart(2,'0')}`;
    return {id:'s'+i,person:e.person,date:d,type:c.type,label:c.label};
  });
}
function load(){
  try{const s=localStorage.getItem(KEY);if(s){ENTRIES=JSON.parse(s);}else{ENTRIES=seed();save();}}catch(e){ENTRIES=seed();}
  try{const p=localStorage.getItem(PKEY);if(p){PEOPLE=JSON.parse(p);}else{PEOPLE=DEFAULT_PEOPLE.slice();savePeople();}}catch(e){PEOPLE=DEFAULT_PEOPLE.slice();}
}
function save(){try{localStorage.setItem(KEY,JSON.stringify(ENTRIES));}catch(e){}}
function savePeople(){try{localStorage.setItem(PKEY,JSON.stringify(PEOPLE));}catch(e){}}

let curYear, curMonth, fPerson="", fType="";
function filtered(){
  return ENTRIES.filter(e=>(!fPerson||e.person===fPerson)&&(!fType||e.type===fType));
}

function renderCalendar(){
  const v=document.getElementById('view-calendar');
  const first=new Date(curYear,curMonth,1);
  const startDow=first.getDay();
  const days=new Date(curYear,curMonth+1,0).getDate();
  const byDay={};
  filtered().forEach(e=>{
    const[y,m,d]=e.date.split('-').map(Number);
    if(y===curYear&&m-1===curMonth){(byDay[d]=byDay[d]||[]).push(e);}
  });
  const todayStr=ymd(new Date());
  let cells='';
  for(let i=0;i<startDow;i++)cells+='<div class="cell empty"></div>';
  for(let d=1;d<=days;d++){
    const dow=new Date(curYear,curMonth,d).getDay();
    const wk=(dow===0||dow===6)?' weekend':'';
    const ds=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const today=ds===todayStr?' today':'';
    const items=byDay[d]||[];
    let pills='';
    items.slice(0,3).forEach(e=>{
      pills+=`<span class="pill" style="background:${typeColor(e.type)}">${e.person}${e.type==='holiday'?' · '+shortLabel(e):''}</span>`;
    });
    if(items.length>3)pills+=`<div class="more">+${items.length-3} more</div>`;
    cells+=`<div class="cell${wk}${today}" data-day="${d}">${pills}<span class="dn" style="position:absolute;top:6px;right:8px">${d}</span></div>`;
  }
  v.innerHTML=`<div class="card">
    <div class="calhead">
      <button class="navbtn" id="prevM">‹</button>
      <h2>${MONTHS[curMonth]} ${curYear}</h2>
      <button class="navbtn" id="nextM">›</button>
    </div>
    <div class="grid">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(g=>`<div class="gh">${g}</div>`).join('')}</div>
    <div class="grid" style="margin-top:6px">${cells}</div>
  </div>`;
  document.getElementById('prevM').onclick=()=>{curMonth--;if(curMonth<0){curMonth=11;curYear--;}renderCalendar();};
  document.getElementById('nextM').onclick=()=>{curMonth++;if(curMonth>11){curMonth=0;curYear++;}renderCalendar();};
  v.querySelectorAll('.cell[data-day]').forEach(c=>c.onclick=()=>openDay(+c.dataset.day));
}
function shortLabel(e){
  if(e.type==='holiday')return e.label.replace(/ ?Holiday.*/i,'').trim()||'Holiday';
  return e.label.length>12?e.label.slice(0,11)+'…':e.label;
}

function renderPeople(){
  const v=document.getElementById('view-people');
  const counts={};ENTRIES.forEach(e=>counts[e.person]=(counts[e.person]||0)+1);
  v.innerHTML=`<div class="card">
    <div class="toolbar">
      <input id="newPerson" class="ctl" placeholder="New person's name" style="min-width:220px">
      <button class="btn" id="addPerson">+ Add person</button>
    </div>
    <table><thead><tr><th>Team member</th><th></th></tr></thead><tbody>
    ${PEOPLE.map(p=>`<tr>
      <td><span class="avatar" style="background:${personColor(p)}">${initials(p)}</span>${p}</td>
      <td style="text-align:right"><button class="btn danger" data-rm="${encodeURIComponent(p)}">Remove</button></td>
    </tr>`).join('')||`<tr><td colspan="2" class="empty-note">No people yet — add one above.</td></tr>`}
    </tbody></table>
    <div class="hint">Removing a person also deletes their leave entries. Added people appear in the calendar and dropdowns.</div>
  </div>`;
  const inp=document.getElementById('newPerson');
  const doAdd=()=>{
    const name=inp.value.trim();
    if(!name)return;
    if(PEOPLE.some(p=>p.toLowerCase()===name.toLowerCase())){alert(name+' is already on the list.');return;}
    PEOPLE.push(name);PEOPLE.sort();savePeople();rebuildDropdowns();renderPeople();
  };
  document.getElementById('addPerson').onclick=doAdd;
  inp.onkeydown=e=>{if(e.key==='Enter')doAdd();};
  v.querySelectorAll('[data-rm]').forEach(b=>b.onclick=()=>{
    const p=decodeURIComponent(b.dataset.rm);
    const n=(counts[p]||0);
    if(!confirm(`Remove ${p}${n?` and their ${n} leave ent`+(n===1?'ry':'ries'):''}?`))return;
    PEOPLE=PEOPLE.filter(x=>x!==p);
    ENTRIES=ENTRIES.filter(e=>e.person!==p);
    if(fPerson===p)fPerson="";
    save();savePeople();rebuildDropdowns();renderPeople();
  });
}

let statsYear=null;
function renderStats(){
  const v=document.getElementById('view-stats');
  const years=[...new Set(ENTRIES.map(e=>+e.date.split('-')[0]))].sort();
  const nowY=new Date().getFullYear();
  if(statsYear===null||!years.includes(statsYear))
    statsYear=years.includes(nowY)?nowY:(years[years.length-1]||nowY);
  const data=filtered().filter(e=>+e.date.split('-')[0]===statsYear);
  const totalTO=data.filter(e=>e.type==='timeoff').length;
  const totalHol=data.filter(e=>e.type==='holiday').length;
  const per={};PEOPLE.forEach(p=>per[p]={timeoff:0,holiday:0});
  data.forEach(e=>{if(per[e.person])per[e.person][e.type]++;});
  const maxTO=Math.max(1,...PEOPLE.map(p=>per[p].timeoff));
  v.innerHTML=`
   <div class="card"><div class="statgrid">
     <div class="stat"><div class="lbl">Time-off days (${statsYear})</div><div class="big">${totalTO}</div></div>
     <div class="stat"><div class="lbl">Holiday days (${statsYear})</div><div class="big">${totalHol}</div></div>
     <div class="stat"><div class="lbl">Total entries</div><div class="big">${data.length}</div></div>
     <div class="stat"><div class="lbl">People</div><div class="big">${PEOPLE.length}</div></div>
   </div></div>
   <div class="card">
     <div class="toolbar" style="margin-bottom:12px">
       <h2 style="margin:0;font-size:16px;flex:1">Time off by person</h2>
       <label class="hint" style="margin:0">Year</label>
       <select id="statsYearSel" class="ctl">${years.map(y=>`<option value="${y}"${y===statsYear?' selected':''}>${y}</option>`).join('')}</select>
     </div>
     ${PEOPLE.map(p=>`<div style="margin-bottom:10px"><div class="minirow"><span><span class="avatar" style="background:${personColor(p)}">${initials(p)}</span>${p}</span><span><b>${per[p].timeoff}</b> time off · ${per[p].holiday} holiday</span></div>
       <div class="bar"><span style="width:${per[p].timeoff/maxTO*100}%;background:${personColor(p)}"></span></div></div>`).join('')||'<div class="empty-note">No people yet.</div>'}
   </div>`;
  const sel=document.getElementById('statsYearSel');
  if(sel)sel.onchange=e=>{statsYear=+e.target.value;renderStats();};
}

let editingId=null;
function fillPersonSelect(sel,val){sel.innerHTML=PEOPLE.map(p=>`<option${p===val?' selected':''}>${p}</option>`).join('');}
function openEdit(id){
  editingId=id;
  const e=ENTRIES.find(x=>x.id===id);
  document.getElementById('modalTitle').textContent='Edit leave';
  fillPersonSelect(document.getElementById('mPerson'),e.person);
  document.getElementById('mStart').value=e.date;
  document.getElementById('mEnd').value=e.date;
  document.getElementById('mType').value=e.type;
  document.getElementById('mNote').value=e.label===labelOf(e.type)?'':e.label;
  document.getElementById('mDelete').style.visibility='visible';
  document.getElementById('editOverlay').classList.add('show');
}
function openAdd(date){
  if(!PEOPLE.length){alert('Add a team member first (People tab).');return;}
  editingId=null;
  document.getElementById('modalTitle').textContent='Add leave';
  fillPersonSelect(document.getElementById('mPerson'),fPerson||PEOPLE[0]);
  const d=date||ymd(new Date());
  document.getElementById('mStart').value=d;
  document.getElementById('mEnd').value=d;
  document.getElementById('mType').value='timeoff';
  document.getElementById('mNote').value='';
  document.getElementById('mDelete').style.visibility='hidden';
  document.getElementById('editOverlay').classList.add('show');
}
function closeEdit(){document.getElementById('editOverlay').classList.remove('show');}
function saveEdit(){
  const person=document.getElementById('mPerson').value;
  const start=document.getElementById('mStart').value;
  const end=document.getElementById('mEnd').value||start;
  const type=document.getElementById('mType').value;
  let note=document.getElementById('mNote').value.trim();
  if(!start){alert('Pick a start date');return;}
  const label=note||labelOf(type);
  if(editingId){
    const e=ENTRIES.find(x=>x.id===editingId);
    e.person=person;e.date=start;e.type=type;e.label=label;
  }else{
    let s=new Date(start+'T00:00:00'),en=new Date(end+'T00:00:00');
    if(en<s)en=s;
    for(let dt=new Date(s);dt<=en;dt.setDate(dt.getDate()+1)){
      const ds=ymd(dt);
      ENTRIES.push({id:'u'+Date.now()+Math.random().toString(36).slice(2,6),person,date:ds,type,label});
    }
  }
  save();closeEdit();refresh();
}
function deleteEntry(){
  if(!editingId)return;
  if(!confirm('Delete this entry?'))return;
  ENTRIES=ENTRIES.filter(x=>x.id!==editingId);
  save();closeEdit();refresh();
}

let dayCtx=null;
function openDay(d){
  dayCtx={year:curYear,month:curMonth,day:d};
  const ds=`${curYear}-${String(curMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const items=ENTRIES.filter(e=>e.date===ds&&(!fPerson||e.person===fPerson)&&(!fType||e.type===fType));
  document.getElementById('dayTitle').textContent=new Date(ds+'T00:00:00').toLocaleDateString(undefined,{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  const dl=document.getElementById('dayList');
  dl.innerHTML=items.length?items.map(e=>`<div class="dayitem">
     <span><span class="avatar" style="background:${personColor(e.person)}">${initials(e.person)}</span>${e.person} — <span class="tag" style="background:${typeColor(e.type)}">${e.label}</span></span>
     <button class="btn ghost" data-e="${e.id}">Edit</button></div>`).join(''):`<div class="empty-note">No leave logged on this day.</div>`;
  dl.querySelectorAll('[data-e]').forEach(b=>b.onclick=()=>{closeDay();openEdit(b.dataset.e);});
  document.getElementById('dayOverlay').classList.add('show');
}
function closeDay(){document.getElementById('dayOverlay').classList.remove('show');}

function toRows(){
  return ENTRIES.slice().sort((a,b)=>a.date<b.date?-1:1)
    .map(e=>({Date:e.date,Person:e.person,Type:labelOf(e.type),Label:e.label}));
}
function exportXlsx(){
  const ws=XLSX.utils.json_to_sheet(toRows());
  const wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,"Leave");
  XLSX.writeFile(wb,"Val_Nav_Leave_Plan.xlsx");
}
function exportCsv(){
  const rows=toRows();
  const csv=["Date,Person,Type,Label"].concat(rows.map(r=>`${r.Date},"${r.Person}","${r.Type}","${r.Label}"`)).join("\n");
  const blob=new Blob([csv],{type:'text/csv'});const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download="Val_Nav_Leave_Plan.csv";a.click();
}
function importFile(file){
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const wb=XLSX.read(ev.target.result,{type:'binary'});
      const rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
      const imported=rows.map((r,i)=>{
        const t=(r.Type||'').toString().toLowerCase();
        return {id:'i'+Date.now()+i,person:(r.Person||'').toString().trim(),date:normDate(r.Date),
          type:t.includes('holiday')?'holiday':'timeoff',label:r.Label||r.Type||''};
      }).filter(r=>r.person&&r.date);
      if(!imported.length){alert('No valid rows found. Expected columns: Date, Person, Type, Label.');return;}
      if(confirm(`Import ${imported.length} rows? This replaces current data.`)){
        ENTRIES=imported;
        const names=[...new Set(imported.map(r=>r.person))];
        names.forEach(n=>{if(!PEOPLE.some(p=>p.toLowerCase()===n.toLowerCase()))PEOPLE.push(n);});
        PEOPLE.sort();save();savePeople();rebuildDropdowns();refresh();
      }
    }catch(e){alert('Could not read file: '+e.message);}
  };
  reader.readAsBinaryString(file);
}
function normDate(v){
  if(v==null)return'';
  if(typeof v==='number'){const d=XLSX.SSF.parse_date_code(v);return `${d.y}-${String(d.m).padStart(2,'0')}-${String(d.d).padStart(2,'0')}`;}
  const s=v.toString().trim();const d=new Date(s);
  return isNaN(d)?s:ymd(d);
}

function rebuildDropdowns(){
  const pf=document.getElementById('personFilter');
  const cur=fPerson;
  pf.innerHTML='<option value="">All people</option>'+PEOPLE.map(p=>`<option${p===cur?' selected':''}>${p}</option>`).join('');
  if(!PEOPLE.includes(cur))fPerson="";
}

let activeTab='calendar';
function refresh(){
  if(activeTab==='calendar')renderCalendar();
  if(activeTab==='people')renderPeople();
  if(activeTab==='stats')renderStats();
}
function setTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(b=>b.classList.toggle('active',b.dataset.tab===t));
  ['calendar','people','stats'].forEach(x=>document.getElementById('view-'+x).style.display=x===t?'':'none');
  refresh();
}

(function(){
  load();
  const now=new Date();
  const years=[...new Set(ENTRIES.map(e=>+e.date.split('-')[0]))];
  curYear=years.includes(now.getFullYear())?now.getFullYear():(years.sort()[0]||now.getFullYear());
  curMonth=now.getMonth();
  rebuildDropdowns();
  document.getElementById('personFilter').onchange=e=>{fPerson=e.target.value;refresh();};
  document.getElementById('typeFilter').onchange=e=>{fType=e.target.value;refresh();};
  document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>setTab(b.dataset.tab));
  document.getElementById('addBtn').onclick=()=>openAdd();
  document.getElementById('mCancel').onclick=closeEdit;
  document.getElementById('mSave').onclick=saveEdit;
  document.getElementById('mDelete').onclick=deleteEntry;
  document.getElementById('editOverlay').onclick=e=>{if(e.target.id==='editOverlay')closeEdit();};
  document.getElementById('dayClose').onclick=closeDay;
  document.getElementById('dayAdd').onclick=()=>{const ds=`${dayCtx.year}-${String(dayCtx.month+1).padStart(2,'0')}-${String(dayCtx.day).padStart(2,'0')}`;closeDay();openAdd(ds);};
  document.getElementById('dayOverlay').onclick=e=>{if(e.target.id==='dayOverlay')closeDay();};
  document.getElementById('exportXlsx').onclick=exportXlsx;
  document.getElementById('exportCsv').onclick=exportCsv;
  document.getElementById('importBtn').onclick=()=>document.getElementById('importFile').click();
  document.getElementById('importFile').onchange=e=>{if(e.target.files[0])importFile(e.target.files[0]);e.target.value='';};
  document.getElementById('resetBtn').onclick=()=>{if(confirm('Reset to the original data from your spreadsheet? This discards your changes.')){ENTRIES=seed();PEOPLE=DEFAULT_PEOPLE.slice();save();savePeople();rebuildDropdowns();refresh();}};
  setTab('calendar');
})();
</script>
</body>
